services:
  - type: web
    name: fundtrace-ai-backend
    env: python
    buildCommand: "bash ./render-build.sh"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_SOURCE
        value: paysim
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: API_KEY
        sync: false
      - key: KAFKA_ENABLED
        value: "false"
      - key: STREAM_MOCK_MODE
        value: "false"
      - key: CORS_ORIGINS
        value: "[\"*\"]"
