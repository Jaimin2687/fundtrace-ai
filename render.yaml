services:
  - type: web
    name: fundtrace-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash ./start_render.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_SOURCE
        value: paysim
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: API_KEY
        sync: false
      - key: KAFKA_ENABLED
        value: "false"
      - key: STREAM_MOCK_MODE
        value: "false"
      - key: BANK_API_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://fundtrace-ai.vercel.app"]'
